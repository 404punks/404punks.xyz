<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>404 PUNKS · MISSION</title>
  <style>
    /* ── RESET ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #008080;  /* classic win95 desktop */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', 'VT323', monospace;
      padding: 16px;
      position: relative;
    }

    /* ── retro 95 window (exactly like the original, but stripped content) ── */
    .w95-window {
      background: #c0c0c0;
      border: 3px solid;
      border-top-color: #ffffff;
      border-left-color: #ffffff;
      border-right-color: #808080;
      border-bottom-color: #808080;
      box-shadow: 2px 2px 0 #000000;
      width: 100%;
      max-width: 580px;
      margin: 0 auto;
    }

    .w95-titlebar {
      background: linear-gradient(90deg, #000080 0%, #1084d0 100%);
      color: #ffffff;
      padding: 5px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: 9px;
      user-select: none;
    }

    .w95-titlebar-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .w95-titlebar-icon {
      font-size: 12px;
    }

    .w95-title-btns {
      display: flex;
      gap: 3px;
    }

    .w95-tbtn {
      background: #c0c0c0;
      color: #000;
      border: 2px solid;
      border-top-color: #ffffff;
      border-left-color: #ffffff;
      border-right-color: #808080;
      border-bottom-color: #808080;
      width: 18px;
      height: 16px;
      font-size: 8px;
      font-family: 'Arial', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .w95-tbtn:active {
      border-top-color: #808080;
      border-left-color: #808080;
      border-right-color: #ffffff;
      border-bottom-color: #ffffff;
    }

    .w95-content {
      padding: 28px 24px 24px 24px;
      background: #c0c0c0;
      text-align: center;
    }

    /* ── THE MESSAGE ── */
    .mission-glitch {
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: clamp(1.8rem, 10vw, 4.2rem);
      font-weight: 700;
      letter-spacing: 4px;
      color: #ffff00;
      text-shadow: 4px 4px 0 #cc0000, 8px 8px 0 rgba(0,0,0,0.3);
      line-height: 1.3;
      word-break: break-word;
    }

    .mission-sub {
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: clamp(0.9rem, 4vw, 1.8rem);
      color: #00ff00;
      letter-spacing: 3px;
      margin-top: 8px;
      text-shadow: 0 0 6px #00aa00;
    }

    /* loading dots (retro) */
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
      100% { content: ''; }
    }

    /* classic win95 progress bar */
    .progress-outer {
      width: 100%;
      max-width: 340px;
      margin: 18px auto 8px auto;
      border: 2px solid;
      border-top-color: #808080;
      border-left-color: #808080;
      border-right-color: #ffffff;
      border-bottom-color: #ffffff;
      background: #ffffff;
      padding: 2px;
      height: 26px;
    }

    .progress-inner {
      height: 100%;
      background: repeating-linear-gradient(90deg, #006400 0px, #006400 14px, #004400 14px, #004400 18px);
      width: 0%;
      animation: loadFill 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite alternate;
    }

    @keyframes loadFill {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    .status-text {
      font-family: 'VT323', 'Courier New', monospace;
      font-size: 16px;
      color: #000080;
      margin-top: 6px;
    }

    /* ── status bar (win95) ── */
    .w95-statusbar {
      background: #c0c0c0;
      border-top: 2px solid #808080;
      padding: 3px 8px;
      display: flex;
      gap: 8px;
      font-family: 'VT323', 'Courier New', monospace;
      font-size: 13px;
    }

    .w95-status-cell {
      border: 2px solid;
      border-top-color: #808080;
      border-left-color: #808080;
      border-right-color: #ffffff;
      border-bottom-color: #ffffff;
      padding: 1px 8px;
      flex: 1;
    }

    /* ── tiny badge ── */
    .badge-404 {
      position: fixed;
      bottom: 18px;
      right: 22px;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: #000080;
      background: #c0c0c0;
      border: 2px solid;
      border-top-color: #ffffff;
      border-left-color: #ffffff;
      border-right-color: #808080;
      border-bottom-color: #808080;
      padding: 4px 10px;
      letter-spacing: 2px;
      opacity: 0.7;
      pointer-events: none;
    }

    /* ── desktop wallpaper texture ── */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        radial-gradient(circle at 20% 80%, rgba(0,0,80,0.15) 0%, transparent 60%),
        radial-gradient(circle at 80% 20%, rgba(0,80,80,0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .w95-window {
      position: relative;
      z-index: 2;
    }

    /* scanlines (very subtle) */
    .scanlines {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg,
        rgba(0, 0, 0, 0.03) 0px,
        rgba(0, 0, 0, 0.03) 2px,
        transparent 2px,
        transparent 6px);
      pointer-events: none;
      z-index: 3;
    }

    /* ── responsive tweaks ── */
    @media (max-width: 500px) {
      .w95-content {
        padding: 20px 14px 16px 14px;
      }
    }
  </style>
</head>
<body>

  <!-- ═══ MAIN WINDOW (WIN95 STYLE, STRIPPED CONTENT) ═══ -->
  <div class="w95-window">
    <!-- title bar -->
    <div class="w95-titlebar">
      <div class="w95-titlebar-left">
        <span class="w95-titlebar-icon">📡</span>
        <span>404 PUNKS · IDENTITY v3.0</span>
      </div>
      <div class="w95-title-btns">
        <button class="w95-tbtn" title="Minimize">_</button>
        <button class="w95-tbtn" title="Maximize">□</button>
        <button class="w95-tbtn" title="Close">✕</button>
      </div>
    </div>

    <!-- content: only the mission phrase + retro loader -->
    <div class="w95-content">
      <div class="mission-glitch">404 PUNK</div>
      <div class="mission-glitch" style="font-size: clamp(1.4rem, 7vw, 3rem); color: #00ddff; text-shadow: 4px 4px 0 #0044aa; margin-top: -4px;">
        MISSION
      </div>
      <div class="mission-sub">
        <span class="dots">loading</span>&nbsp;…
      </div>

      <!-- win95 progress bar -->
      <div class="progress-outer">
        <div class="progress-inner"></div>
      </div>

      <div class="status-text">▶  bootstrapping retro kernel …</div>
      <div class="status-text" style="font-size: 13px; color: #444; margin-top: 2px;">⌛ 404 signal acquired</div>
    </div>

    <!-- status bar -->
    <div class="w95-statusbar">
      <div class="w95-status-cell">🚀  MISSION ACTIVE</div>
      <div class="w95-status-cell">404 PUNKS v2.0</div>
      <div class="w95-status-cell">▌▌▌▌▌</div>
    </div>
  </div>

  <!-- scanlines overlay -->
  <div class="scanlines"></div>

  <!-- tiny 404 badge (win95 style) -->
  <div class="badge-404">// 404 //</div>

  <!-- no javascript, no firebase, no canvas, no generator – pure win95 retro mission -->
</body>
</html>
