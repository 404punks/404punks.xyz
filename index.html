  <script>
        const target = new Date('2026-06-10T15:00:00Z').getTime();
        function update() {
            const diff = Math.max(0, target - Date.now());
            const s = Math.floor(diff / 1000);
            document.getElementById('days').textContent = String(Math.floor(s / 86400)).padStart(2, '0');
            document.getElementById('hours').textContent = String(Math.floor((s % 86400) / 3600)).padStart(2, '0');
            document.getElementById('mins').textContent = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
            document.getElementById('secs').textContent = String(s % 60).padStart(2, '0');
        }
        update();
        setInterval(update, 1000);
    </script>
